# Pre-commit hooks per HANDOFF s10. Install once with `pre-commit install`.
# Gitleaks is the secret-scanning safety net for the .env file (3 providers'
# API keys live there); the repo is public, so one accidental `git add .`
# without this hook would leak everything.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
